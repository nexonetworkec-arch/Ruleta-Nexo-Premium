# SonarQube Enterprise Configuration File
# Project metadata
sonar.projectKey=ruleta-nexo-premium-enterprise
sonar.projectName=Ruleta Nexo Premium - Enterprise
sonar.projectVersion=1.0.0

# Path to sources
sonar.sources=.
sonar.exclusions=node_modules/**, dist/**, coverage/**, tests/**, vercel.json, html2canvas.js, sw.js

# Path to tests
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts, tests/**/*.spec.ts

# Source encoding
sonar.sourceEncoding=UTF-8

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Code Quality & Standards settings
sonar.qualitygate.wait=true
sonar.qualitygate.status=OK

# Test coverage integration
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Severity mappings & Security Rules
sonar.issue.ignore.multiline=false
sonar.security.sandbox=true
